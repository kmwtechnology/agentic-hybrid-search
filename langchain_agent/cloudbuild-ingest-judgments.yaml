steps:
  # Install dependencies and run judgments ingestion
  - name: 'python:3.13'
    entrypoint: bash
    args:
      - '-c'
      - |
        cd langchain_agent
        pip install -q -r requirements.txt
        PYTHONPATH=. python ingest_esci_judgments.py
    env:
      - 'GOOGLE_API_KEY=${_GOOGLE_API_KEY}'
      - 'OPENSEARCH_HOST=34.138.97.13'
      - 'OPENSEARCH_PORT=9200'

substitutions:
  _GOOGLE_API_KEY: 'placeholder'

timeout: '3600s'
