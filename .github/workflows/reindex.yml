name: Re-Index OpenSearch

# Drop-and-rebuild the product index on Cloud Run.
#
# Flow:
#   1. POST /api/admin/reindex — accepted synchronously, queues a background task.
#      The handler also resets in-process job state to "queued" so polling
#      can't be fooled by a previous run's terminal state.
#   2. Poll /api/admin/reindex/status until status is "success" or "error".
#      Doc count is intentionally ignored as a completion signal — the ETL
#      may ingest fewer than `limit` documents (dedup, sample caps, etc.).
#   3. Smoke-test the typeahead endpoint against the rebuilt index.

on:
  workflow_dispatch:
    inputs:
      reset_index:
        description: 'Drop and recreate the index before ingest (use true when mappings changed)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      limit:
        description: 'Max products to ingest (final count may be ≤ this)'
        required: true
        default: '10000'

env:
  SERVICE_URL: https://agentic-hybrid-search-375500751528.us-central1.run.app
  POLL_INTERVAL_SECONDS: 15
  DEADLINE_MINUTES: 25

jobs:
  reindex:
    name: Re-index OpenSearch
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Trigger re-index
        run: |
          set -euo pipefail
          RESET='${{ github.event.inputs.reset_index }}'
          LIMIT='${{ github.event.inputs.limit }}'

          echo "Service:       ${SERVICE_URL}"
          echo "reset_index:   ${RESET}"
          echo "limit:         ${LIMIT}"
          echo

          RESP=$(curl -sS -w "\n%{http_code}" \
            "${SERVICE_URL}/api/admin/reindex?reset_index=${RESET}&limit=${LIMIT}")
          HTTP=$(echo "$RESP" | tail -n 1)
          BODY=$(echo "$RESP" | head -n -1)

          echo "Trigger response (HTTP $HTTP):"
          echo "$BODY" | jq '.' 2>/dev/null || echo "$BODY"

          if [ "$HTTP" != "200" ]; then
            echo "::error::Trigger failed with HTTP $HTTP"
            exit 1
          fi

      - name: Wait for ETL completion
        id: wait
        run: |
          set -euo pipefail
          POLL=${POLL_INTERVAL_SECONDS}
          DEADLINE=$(( $(date +%s) + DEADLINE_MINUTES * 60 ))
          START=$(date +%s)
          LAST=""

          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            sleep "$POLL"

            BODY=$(curl -sS --max-time 10 "${SERVICE_URL}/api/admin/reindex/status" || echo '{}')
            STATUS=$(echo "$BODY" | jq -r '.status // "unknown"')
            ELAPSED=$(( $(date +%s) - START ))

            if [ "$STATUS" != "$LAST" ]; then
              echo "[t+${ELAPSED}s] status: ${LAST:-<start>} -> ${STATUS}"
              LAST="$STATUS"
            elif [ $(( ELAPSED % 60 )) -lt "$POLL" ]; then
              echo "[t+${ELAPSED}s] status: ${STATUS}"
            fi

            case "$STATUS" in
              success)
                echo
                echo "════════════════════════════════════════════════"
                echo "Re-index completed"
                echo "$BODY" | jq '{status, started_at, finished_at, limit, reset_index, documents_ingested, chunks_created}'
                exit 0
                ;;
              error)
                echo "::error::ETL failed"
                echo "$BODY" | jq '.'
                exit 1
                ;;
            esac
          done

          echo "::error::Deadline (${DEADLINE_MINUTES} min) exceeded without terminal status"
          echo "Last status response:"
          curl -sS "${SERVICE_URL}/api/admin/reindex/status" | jq '.' || true
          exit 1

      - name: Verify index and typeahead
        if: success()
        run: |
          set -euo pipefail
          echo "Final index health:"
          curl -sS "${SERVICE_URL}/api/admin/health" | jq '.'
          echo
          echo "Typeahead probe (q=son):"
          curl -sS "${SERVICE_URL}/api/suggest?q=son" | jq '{
            count: (.suggestions | length),
            top3: (.suggestions[0:3] | map({title, brand, score})),
            spell_correction
          }'
