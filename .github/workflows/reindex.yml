name: Re-Index OpenSearch

on:
  workflow_dispatch:
    inputs:
      reset_index:
        description: 'Reset index before re-indexing'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      limit:
        description: 'Number of products to ingest'
        required: true
        default: '10000'

env:
  SERVICE_URL: https://agentic-hybrid-search-375500751528.us-central1.run.app

jobs:
  reindex:
    name: Re-index OpenSearch
    runs-on: ubuntu-latest

    steps:
      - name: Set re-index parameters
        id: params
        run: |
          echo "reset_index=${{ github.event.inputs.reset_index }}" >> $GITHUB_OUTPUT
          echo "limit=${{ github.event.inputs.limit }}" >> $GITHUB_OUTPUT

      - name: Trigger re-index
        id: reindex
        run: |
          echo "🔄 Triggering re-index with reset_index=${{ steps.params.outputs.reset_index }}, limit=${{ steps.params.outputs.limit }}"
          echo ""

          RESPONSE=$(curl -v "${{ env.SERVICE_URL }}/api/admin/reindex?reset_index=${{ steps.params.outputs.reset_index }}&limit=${{ steps.params.outputs.limit }}" 2>&1)
          echo "Full response:"
          echo "$RESPONSE"
          echo ""

          HTTP_CODE=$(echo "$RESPONSE" | grep "< HTTP" | awk '{print $3}')
          echo "HTTP Status: $HTTP_CODE"

          # Extract just the JSON body
          JSON=$(echo "$RESPONSE" | tail -1)
          echo "JSON Response:"
          echo "$JSON" | jq '.' 2>/dev/null || echo "$JSON"
          echo ""
          echo "response=$JSON" >> $GITHUB_OUTPUT

      - name: Monitor re-index progress
        run: |
          echo "⏳ Monitoring re-index progress (checking every 10s for 5 minutes)..."
          echo ""

          PREV_COUNT=0
          STUCK_COUNTER=0

          for i in {1..30}; do
            sleep 10

            HEALTH=$(curl -s "${{ env.SERVICE_URL }}/api/admin/health")
            DOC_COUNT=$(echo "$HEALTH" | jq -r '.opensearch.documents // "error"')
            STATUS=$(echo "$HEALTH" | jq -r '.status // "unknown"')

            echo "[$((i*10))s] Documents: $DOC_COUNT | Status: $STATUS"

            # Check if stuck (no progress for 2+ checks)
            if [ "$DOC_COUNT" = "$PREV_COUNT" ] && [ "$DOC_COUNT" != "error" ]; then
              STUCK_COUNTER=$((STUCK_COUNTER + 1))
              if [ $STUCK_COUNTER -ge 2 ]; then
                echo "⚠️  WARNING: Document count stuck at $DOC_COUNT for 20+ seconds"
              fi
            else
              STUCK_COUNTER=0
            fi

            PREV_COUNT=$DOC_COUNT

            if [ "$DOC_COUNT" = "10000" ]; then
              echo ""
              echo "✅ RE-INDEX COMPLETE! Index now has 10,000 documents."
              echo "Full health status:"
              echo "$HEALTH" | jq '.'
              exit 0
            fi

            if [ "$DOC_COUNT" = "error" ]; then
              echo "❌ ERROR: Could not retrieve document count"
              echo "Full health response:"
              echo "$HEALTH" | jq '.'
            fi
          done
          echo ""
          echo "⏳ Re-index still in progress after 5 minutes (will continue in background)"
          echo "Final health check:"
          curl -s "${{ env.SERVICE_URL }}/api/admin/health" | jq '.'

      - name: Diagnose re-index failure
        run: |
          echo "🔍 Attempting to diagnose re-index issue..."
          echo ""

          # Check if API is responding
          echo "1️⃣  Testing API connectivity..."
          curl -s -I "${{ env.SERVICE_URL }}/api/admin/health" | head -3
          echo ""

          # Check current index state
          echo "2️⃣  Current index state:"
          curl -s "${{ env.SERVICE_URL }}/api/admin/health" | jq '.'
          echo ""

          # Attempt a fresh re-index call to see if there's an error in the response
          echo "3️⃣  Testing re-index endpoint (fresh call):"
          FRESH_RESPONSE=$(curl -s "${{ env.SERVICE_URL }}/api/admin/reindex?reset_index=false&limit=100")
          echo "$FRESH_RESPONSE" | jq '.'
          echo ""

          # Check for error in response
          ERROR=$(echo "$FRESH_RESPONSE" | jq -r '.error // empty')
          if [ -n "$ERROR" ]; then
            echo "❌ ERROR DETECTED:"
            echo "$ERROR"
          fi

      - name: Verify index health
        run: |
          echo ""
          echo "🏥 Final health check:"
          curl -s "${{ env.SERVICE_URL }}/api/admin/health" | jq '.'

      - name: Report status
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "✅ RE-INDEX WORKFLOW COMPLETE"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "Service: ${{ env.SERVICE_URL }}"
          echo "API Endpoints:"
          echo "  • GET /api/admin/reindex - Trigger re-indexing"
          echo "  • GET /api/admin/health - Check index status"
          echo "  • GET /api/suggest - Typeahead autocomplete"
          echo ""
