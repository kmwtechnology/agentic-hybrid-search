name: Re-Index OpenSearch

on:
  workflow_dispatch:
    inputs:
      reset_index:
        description: 'Reset index before re-indexing'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      limit:
        description: 'Number of products to ingest'
        required: true
        default: '10000'

env:
  SERVICE_URL: https://agentic-hybrid-search-375500751528.us-central1.run.app

jobs:
  reindex:
    name: Re-index OpenSearch
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baseline health check
        id: baseline
        run: |
          HEALTH=$(curl -s "${{ env.SERVICE_URL }}/api/admin/health")
          STATUS=$(echo "$HEALTH" | jq -r '.status // "unknown"')
          DOCS=$(echo "$HEALTH" | jq -r '.opensearch.documents // 0')
          INDEX=$(echo "$HEALTH" | jq -r '.opensearch.index // "unknown"')
          echo "Service:          ${{ env.SERVICE_URL }}"
          echo "Status:           $STATUS"
          echo "Index:            $INDEX"
          echo "Baseline docs:    $DOCS"
          echo "Params:           reset_index=${{ github.event.inputs.reset_index }}, limit=${{ github.event.inputs.limit }}"
          echo "baseline=$DOCS" >> $GITHUB_OUTPUT

      - name: Trigger re-index
        id: trigger
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${{ env.SERVICE_URL }}/api/admin/reindex?reset_index=${{ github.event.inputs.reset_index }}&limit=${{ github.event.inputs.limit }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE"
          echo "$BODY" | jq '.' 2>/dev/null || echo "$BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi
          STATUS=$(echo "$BODY" | jq -r '.status // "unknown"')
          if [ "$STATUS" != "started" ]; then
            echo "::warning::Unexpected status: $STATUS"
          fi

      - name: Monitor progress (stability-based completion)
        id: monitor
        run: |
          TARGET=${{ github.event.inputs.limit }}
          BASELINE=${{ steps.baseline.outputs.baseline }}
          RESET="${{ github.event.inputs.reset_index }}"

          # Completion tuning
          POLL_INTERVAL=10            # seconds between health checks
          STABILITY_WINDOW=90         # count must be unchanged this long to be considered "done"
          MIN_GROWTH=100              # require at least this many new docs vs. the post-reset floor
          GRACE_BEFORE_STABILITY=60   # ignore stability for the first minute (ingest takes a moment to start)

          PREV=$BASELINE
          FLOOR=$BASELINE             # lowest observed count; resets to 0 after reset_index
          RESET_SEEN=false
          LAST_CHANGE_TS=$(date +%s)
          START=$(date +%s)
          DEADLINE=$((START + 25 * 60))  # 25 min upper bound

          COMPLETION_REASON=""
          FINAL_COUNT=$BASELINE

          echo "[t+0s] docs=$BASELINE (baseline) | polling every ${POLL_INTERVAL}s; stability window=${STABILITY_WINDOW}s"

          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            sleep "$POLL_INTERVAL"
            NOW=$(date +%s)
            ELAPSED=$((NOW - START))

            HEALTH=$(curl -s --max-time 10 "${{ env.SERVICE_URL }}/api/admin/health" || echo '{}')
            COUNT=$(echo "$HEALTH" | jq -r '.opensearch.documents // empty')

            if [ -z "$COUNT" ]; then
              echo "[t+${ELAPSED}s] health check failed (endpoint unreachable or malformed response)"
              continue
            fi

            FINAL_COUNT=$COUNT

            # Detect the reset moment: count drops below baseline with reset_index=true.
            if [ "$RESET" = "true" ] && [ "$RESET_SEEN" = "false" ] && [ "$COUNT" -lt "$BASELINE" ]; then
              echo "[t+${ELAPSED}s] index reset detected (docs dropped $BASELINE -> $COUNT); ingesting up to $TARGET"
              RESET_SEEN=true
              FLOOR=$COUNT
              PREV=$COUNT
              LAST_CHANGE_TS=$NOW
              continue
            fi

            # Track the lowest post-reset value as our growth baseline.
            if [ "$COUNT" -lt "$FLOOR" ]; then
              FLOOR=$COUNT
            fi

            if [ "$COUNT" != "$PREV" ]; then
              DELTA=$((COUNT - PREV))
              SIGN=$([ $DELTA -ge 0 ] && echo "+" || echo "")
              PCT=$(awk "BEGIN {printf \"%.0f\", ($COUNT * 100.0) / $TARGET}")
              echo "[t+${ELAPSED}s] docs=$COUNT (${SIGN}${DELTA}) ${PCT}% of target"
              PREV=$COUNT
              LAST_CHANGE_TS=$NOW
            fi

            GROWTH=$((COUNT - FLOOR))
            SINCE_CHANGE=$((NOW - LAST_CHANGE_TS))

            # Success path 1: genuinely reached the target.
            if [ "$COUNT" -ge "$TARGET" ]; then
              COMPLETION_REASON="reached target of $TARGET documents"
              echo "[t+${ELAPSED}s] complete: $COMPLETION_REASON"
              break
            fi

            # Success path 2: count has been stable long enough and we grew meaningfully.
            # Skip the stability check during the initial grace period so we don't false-positive
            # before ingest actually starts writing.
            if [ "$ELAPSED" -ge "$GRACE_BEFORE_STABILITY" ] \
               && [ "$SINCE_CHANGE" -ge "$STABILITY_WINDOW" ] \
               && [ "$GROWTH" -ge "$MIN_GROWTH" ]; then
              PCT=$(awk "BEGIN {printf \"%.1f\", ($COUNT * 100.0) / $TARGET}")
              COMPLETION_REASON="count stable at $COUNT for ${SINCE_CHANGE}s (grew +${GROWTH} from floor ${FLOOR}, ${PCT}% of target ${TARGET})"
              echo "[t+${ELAPSED}s] complete: $COMPLETION_REASON"
              break
            fi
          done

          if [ -z "$COMPLETION_REASON" ]; then
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              GROWTH=$((FINAL_COUNT - FLOOR))
              if [ "$GROWTH" -ge "$MIN_GROWTH" ]; then
                COMPLETION_REASON="25-min deadline hit; treating as complete (docs=$FINAL_COUNT, grew +${GROWTH} from floor ${FLOOR})"
                echo "::warning::${COMPLETION_REASON}"
              else
                echo "::error::25-minute deadline reached with insufficient growth (docs=$FINAL_COUNT, floor=$FLOOR, growth=+${GROWTH}). Ingest may have failed to start."
                exit 1
              fi
            fi
          fi

          echo "completion_reason=$COMPLETION_REASON" >> $GITHUB_OUTPUT
          echo "final_count=$FINAL_COUNT" >> $GITHUB_OUTPUT

      - name: Typeahead smoke check
        run: |
          echo "Probing /api/suggest?q=son — should return prefix matches, not random products."
          RESP=$(curl -s "${{ env.SERVICE_URL }}/api/suggest?q=son")
          echo "$RESP" | jq '{
            count: (.suggestions | length),
            top3: (.suggestions[0:3] | map({title, brand, score})),
            spell_correction
          }'
          # Real prefix matches should have non-zero scores. If all zeros,
          # the title_suggest field still isn't populated.
          ALL_ZERO=$(echo "$RESP" | jq '[.suggestions[] | .score] | all(. == 0)')
          if [ "$ALL_ZERO" = "true" ]; then
            echo "::warning::All suggestion scores are 0 — title_suggest may still be missing from the mapping."
          fi

      - name: Final status
        if: always()
        run: |
          HEALTH=$(curl -s "${{ env.SERVICE_URL }}/api/admin/health")
          DOCS=$(echo "$HEALTH" | jq -r '.opensearch.documents // 0')
          REASON="${{ steps.monitor.outputs.completion_reason }}"
          echo "════════════════════════════════════════════════════════"
          echo "Final doc count:  $DOCS"
          echo "Service:          ${{ env.SERVICE_URL }}"
          if [ -n "$REASON" ]; then
            echo "Completion:       $REASON"
          else
            echo "Completion:       (monitor step did not run to completion)"
          fi
          echo "════════════════════════════════════════════════════════"
