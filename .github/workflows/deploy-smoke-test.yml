name: Post-Deployment Smoke Tests

on:
  workflow_run:
    workflows: ["Build & Deploy"]
    types: [completed]
    branches: [main]

env:
  PROJECT_ID: gen-lang-client-0250737934
  REGION: us-central1
  SERVICE_NAME: agentic-hybrid-search

jobs:
  smoke-test:
    name: Run Deployment Smoke Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd langchain_agent
          pip install pytest pytest-asyncio httpx websockets

      - name: Get Cloud Run service URL
        id: service-url
        run: |
          gcloud auth application-default login --quiet || true
          # For now, construct the URL based on project ID and service name
          SERVICE_URL="https://${SERVICE_NAME}-375500751528.${REGION}.run.app"
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_OUTPUT

      - name: Wait for service to be ready
        run: |
          SERVICE_URL="${{ steps.service-url.outputs.SERVICE_URL }}"
          max_retries=10
          retry_count=0

          echo "Waiting for Cloud Run service to be ready..."
          while [ $retry_count -lt $max_retries ]; do
            if curl -sf "$SERVICE_URL/api/health" > /dev/null 2>&1; then
              echo "✓ Service is ready"
              exit 0
            fi
            echo "⏳ Attempt $((retry_count + 1))/$max_retries - Service not ready yet"
            retry_count=$((retry_count + 1))
            sleep 3
          done

          echo "❌ Service failed to become ready after $max_retries attempts"
          exit 1

      - name: Run health check smoke test
        run: |
          SERVICE_URL="${{ steps.service-url.outputs.SERVICE_URL }}"
          echo "Testing health endpoint: $SERVICE_URL/api/health"

          response=$(curl -s "$SERVICE_URL/api/health")
          echo "Health response: $response"

          # Check if response contains expected fields
          echo "$response" | grep -q '"status"' || (echo "❌ Missing status field" && exit 1)
          echo "$response" | grep -q '"postgres"' || (echo "❌ Missing postgres field" && exit 1)
          echo "$response" | grep -q '"google_ai"' || (echo "❌ Missing google_ai field" && exit 1)
          echo "$response" | grep -q '"vector_store"' || (echo "❌ Missing vector_store field" && exit 1)

          echo "✓ Health check passed"

      - name: Run deployment smoke tests
        env:
          CLOUD_RUN_URL: ${{ steps.service-url.outputs.SERVICE_URL }}
          PYTHONPATH: langchain_agent
        run: |
          cd langchain_agent

          # Run smoke tests with markers
          pytest tests/e2e/test_deployment_smoke.py \
            -v \
            --tb=short \
            -m "e2e and slow" \
            --timeout=30 \
            2>&1 | tee smoke-test-results.txt

          exit_code=${PIPESTATUS[0]}

          if [ $exit_code -eq 0 ]; then
            echo "✓ Smoke tests passed"
          else
            echo "❌ Smoke tests failed"
          fi

          exit $exit_code

      - name: Run Cloud Run deployment tests
        env:
          CLOUD_RUN_URL: ${{ steps.service-url.outputs.SERVICE_URL }}
          PYTHONPATH: langchain_agent
        run: |
          cd langchain_agent

          pytest tests/e2e/test_cloud_run_deployment.py \
            -v \
            --tb=short \
            -m "e2e and slow" \
            --timeout=30 \
            2>&1 | tee cloud-run-test-results.txt

          exit_code=${PIPESTATUS[0]}

          if [ $exit_code -eq 0 ]; then
            echo "✓ Cloud Run tests passed"
          else
            echo "❌ Cloud Run tests failed"
          fi

          exit $exit_code

      - name: Run deployment data tests
        env:
          CLOUD_RUN_URL: ${{ steps.service-url.outputs.SERVICE_URL }}
          PYTHONPATH: langchain_agent
        run: |
          cd langchain_agent

          pytest tests/e2e/test_deployment_data.py \
            -v \
            --tb=short \
            -m "e2e and slow" \
            --timeout=30 \
            2>&1 | tee data-test-results.txt

          exit_code=${PIPESTATUS[0]}

          if [ $exit_code -eq 0 ]; then
            echo "✓ Data tests passed"
          else
            echo "❌ Data tests failed"
          fi

          exit $exit_code

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: smoke-test-results
          path: |
            langchain_agent/smoke-test-results.txt
            langchain_agent/cloud-run-test-results.txt
            langchain_agent/data-test-results.txt

      - name: Report deployment status
        if: always()
        run: |
          echo "## Deployment Smoke Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service URL:** ${{ steps.service-url.outputs.SERVICE_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Summary" >> $GITHUB_STEP_SUMMARY

          if [ -f "langchain_agent/smoke-test-results.txt" ]; then
            test_count=$(grep -c "PASSED\|FAILED" langchain_agent/smoke-test-results.txt || echo "0")
            echo "- **Smoke Tests:** $test_count tests" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "langchain_agent/cloud-run-test-results.txt" ]; then
            test_count=$(grep -c "PASSED\|FAILED" langchain_agent/cloud-run-test-results.txt || echo "0")
            echo "- **Cloud Run Tests:** $test_count tests" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "langchain_agent/data-test-results.txt" ]; then
            test_count=$(grep -c "PASSED\|FAILED" langchain_agent/data-test-results.txt || echo "0")
            echo "- **Data Tests:** $test_count tests" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify Slack (optional)
        if: failure()
        run: |
          echo "⚠️ Deployment smoke tests failed for ${{ env.SERVICE_NAME }}"
          echo "Service URL: ${{ steps.service-url.outputs.SERVICE_URL }}"
          echo "Check logs for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  notification:
    name: Deployment Test Status Notification
    runs-on: ubuntu-latest
    needs: smoke-test
    if: always()

    steps:
      - name: Check smoke test results
        run: |
          if [ "${{ needs.smoke-test.result }}" = "success" ]; then
            echo "✅ All deployment smoke tests passed"
            exit 0
          else
            echo "❌ Deployment smoke tests failed"
            exit 1
          fi
