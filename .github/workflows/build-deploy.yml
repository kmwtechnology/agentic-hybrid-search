name: Build & Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'langchain_agent/**'
      - '.github/workflows/build-deploy.yml'
      - 'docker-compose.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'langchain_agent/**'
      - '.github/workflows/build-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PROJECT_ID: gen-lang-client-0250737934
  REGION: us-central1
  SERVICE_NAME: agentic-hybrid-search
  ARTIFACT_REGISTRY_REPO: agentic-hybrid-search
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel stale PR runs when a new push lands on the same branch — saves CI
# minutes on rapid-fire pushes. Main-branch runs are NEVER cancelled so we
# always finish a deploy after merge.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit-tests:
    name: Phase 1 - Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd langchain_agent
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout pytest-xdist

      - name: Create test .env
        run: |
          cd langchain_agent
          cat > .env.test << EOF
          GOOGLE_API_KEY=test-key-12345
          POSTGRES_USER=test
          POSTGRES_PASSWORD=test
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          POSTGRES_DB=agentic_hybrid_search_test
          OPENSEARCH_HOST=localhost
          OPENSEARCH_PORT=9200
          OPENSEARCH_USE_SSL=false
          API_KEY=test-api-key-12345
          LLM_MODEL=gemini-3-flash-preview
          RERANKER_MODEL=gemini-3.1-flash-lite-preview
          QUERY_EVAL_MODEL=gemini-3.1-flash-lite-preview
          EMBEDDINGS_MODEL=models/gemini-embedding-001
          EOF

      - name: Run Phase 1 Unit Tests
        run: |
          cd langchain_agent
          PYTHONPATH=. pytest tests/unit/ \
            -v \
            --tb=short \
            --timeout=30 \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing:skip-covered \
            --junit-xml=test-results-phase1.xml
        env:
          ENV_FILE: .env.test

      - name: Generate unit test summary
        if: always()
        run: |
          cd langchain_agent
          TESTS="?" PASSED="?" FAILURES="0" ERRORS="0" SKIPPED="?" STATUS="⚠️ No results" COVERAGE="?"
          if [ -f test-results-phase1.xml ]; then
            TESTS=$(python3 -c "import xml.etree.ElementTree as ET; r=ET.parse('test-results-phase1.xml').getroot(); print(r.get('tests','?'))")
            FAILURES=$(python3 -c "import xml.etree.ElementTree as ET; r=ET.parse('test-results-phase1.xml').getroot(); print(r.get('failures','0'))")
            ERRORS=$(python3 -c "import xml.etree.ElementTree as ET; r=ET.parse('test-results-phase1.xml').getroot(); print(r.get('errors','0'))")
            SKIPPED=$(python3 -c "import xml.etree.ElementTree as ET; r=ET.parse('test-results-phase1.xml').getroot(); print(r.get('skipped','0'))")
            PASSED=$((TESTS - FAILURES - ERRORS - SKIPPED))
            if [ "${FAILURES}" -gt 0 ] || [ "${ERRORS}" -gt 0 ]; then
              STATUS="❌ Failed"
            else
              STATUS="✅ Passed"
            fi
          fi
          if [ -f coverage.xml ]; then
            COVERAGE=$(python3 -c "import xml.etree.ElementTree as ET; r=ET.parse('coverage.xml').getroot(); print(f\"{float(r.get('line-rate',0))*100:.1f}\")")
          fi
          {
            echo "## Phase 1 — Unit Test Results"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Status | $STATUS |"
            echo "| Total tests | $TESTS |"
            echo "| Passed | $PASSED |"
            echo "| Failed | $FAILURES |"
            echo "| Errors | $ERRORS |"
            echo "| Skipped | $SKIPPED |"
            echo "| Line coverage | ${COVERAGE}% |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Phase 1 Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-phase1
          path: langchain_agent/htmlcov/
          retention-days: 30

      - name: Upload Phase 1 Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-phase1
          path: langchain_agent/test-results-phase1.xml
          retention-days: 30

  integration-tests:
    name: Phase 2 - Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agentic_hybrid_search_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      opensearch:
        image: opensearchproject/opensearch:2.11.0
        env:
          discovery.type: single-node
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: TestPassword123!
          OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
          DISABLE_SECURITY_PLUGIN: "true"
        options: >-
          --health-cmd "curl -s http://localhost:9200 > /dev/null || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
        ports:
          - 9200:9200

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd langchain_agent
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout pytest-xdist

      - name: Create test .env
        run: |
          cd langchain_agent
          cat > .env.test << EOF
          GOOGLE_API_KEY=test-key-12345
          POSTGRES_USER=test
          POSTGRES_PASSWORD=test
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          POSTGRES_DB=agentic_hybrid_search_test
          OPENSEARCH_HOST=localhost
          OPENSEARCH_PORT=9200
          OPENSEARCH_USE_SSL=false
          API_KEY=test-api-key-12345
          LLM_MODEL=gemini-3-flash-preview
          RERANKER_MODEL=gemini-3.1-flash-lite-preview
          QUERY_EVAL_MODEL=gemini-3.1-flash-lite-preview
          EMBEDDINGS_MODEL=models/gemini-embedding-001
          EOF

      - name: Verify Services
        run: |
          echo "Checking PostgreSQL..."
          pg_isready -h localhost -p 5432 -U test
          echo "PostgreSQL ready!"

          echo "Checking OpenSearch..."
          curl -s http://localhost:9200 | head -c 50
          echo ""
          echo "OpenSearch ready!"

      - name: Run Phase 2 Integration Tests
        run: |
          cd langchain_agent
          PYTHONPATH=. pytest tests/integration/ \
            -v \
            --tb=short \
            --timeout=60 \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing:skip-covered \
            --junit-xml=test-results-phase2.xml
        env:
          ENV_FILE: .env.test

      - name: Generate integration test summary
        if: always()
        run: |
          cd langchain_agent
          TESTS="?" PASSED="?" FAILURES="0" ERRORS="0" SKIPPED="?" STATUS="⚠️ No results"
          if [ -f test-results-phase2.xml ]; then
            TESTS=$(python3 -c "import xml.etree.ElementTree as ET; r=ET.parse('test-results-phase2.xml').getroot(); print(r.get('tests','?'))")
            FAILURES=$(python3 -c "import xml.etree.ElementTree as ET; r=ET.parse('test-results-phase2.xml').getroot(); print(r.get('failures','0'))")
            ERRORS=$(python3 -c "import xml.etree.ElementTree as ET; r=ET.parse('test-results-phase2.xml').getroot(); print(r.get('errors','0'))")
            SKIPPED=$(python3 -c "import xml.etree.ElementTree as ET; r=ET.parse('test-results-phase2.xml').getroot(); print(r.get('skipped','0'))")
            PASSED=$((TESTS - FAILURES - ERRORS - SKIPPED))
            if [ "${FAILURES}" -gt 0 ] || [ "${ERRORS}" -gt 0 ]; then
              STATUS="❌ Failed"
            else
              STATUS="✅ Passed"
            fi
          fi
          {
            echo "## Phase 2 — Integration Test Results"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Status | $STATUS |"
            echo "| Total tests | $TESTS |"
            echo "| Passed | $PASSED |"
            echo "| Failed | $FAILURES |"
            echo "| Errors | $ERRORS |"
            echo "| Skipped | $SKIPPED |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Phase 2 Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-phase2
          path: langchain_agent/test-results-phase2.xml
          retention-days: 30

  lint-backend:
    name: Linting & Type Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install flake8 black isort mypy types-requests

      - name: Run all lint and type checks
        id: lint
        run: |
          cd langchain_agent
          BLACK_STATUS="✅ Passed"; black --check . 2>&1 || BLACK_STATUS="❌ Failed"
          ISORT_STATUS="✅ Passed"; isort --check-only . 2>&1 || ISORT_STATUS="❌ Failed"
          FLAKE8_STATUS="✅ Passed"; flake8 . --count 2>&1 || FLAKE8_STATUS="❌ Failed"
          MYPY_STATUS="✅ Passed"; mypy main.py 2>&1 || MYPY_STATUS="❌ Failed"

          {
            echo "## Linting & Type Check Results"
            echo ""
            echo "| Tool | Status |"
            echo "|------|--------|"
            echo "| black (formatting) | $BLACK_STATUS |"
            echo "| isort (imports) | $ISORT_STATUS |"
            echo "| flake8 (style) | $FLAKE8_STATUS |"
            echo "| mypy (types) | $MYPY_STATUS |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Fail the step if any check failed
          LINT_FAILED=0
          [[ "$BLACK_STATUS" == *Failed* ]] && LINT_FAILED=1
          [[ "$ISORT_STATUS" == *Failed* ]] && LINT_FAILED=1
          [[ "$FLAKE8_STATUS" == *Failed* ]] && LINT_FAILED=1
          [[ "$MYPY_STATUS" == *Failed* ]] && LINT_FAILED=1
          exit $LINT_FAILED

  frontend-tests:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: langchain_agent/web/package-lock.json

      - name: Install dependencies
        run: |
          cd langchain_agent/web
          npm ci

      - name: Run frontend tests
        run: |
          cd langchain_agent/web
          npm run test

      - name: Lint and type-check frontend
        run: |
          cd langchain_agent/web
          ESLINT_STATUS="✅ Passed"; npm run lint 2>&1 || ESLINT_STATUS="❌ Failed"
          TSC_STATUS="✅ Passed"; npx tsc --noEmit 2>&1 || TSC_STATUS="❌ Failed"

          {
            echo "## Frontend Lint & Type Check"
            echo ""
            echo "| Tool | Status |"
            echo "|------|--------|"
            echo "| ESLint | $ESLINT_STATUS |"
            echo "| TypeScript (tsc) | $TSC_STATUS |"
          } >> "$GITHUB_STEP_SUMMARY"

          FE_FAILED=0
          [[ "$ESLINT_STATUS" == *Failed* ]] && FE_FAILED=1
          [[ "$TSC_STATUS" == *Failed* ]] && FE_FAILED=1
          exit $FE_FAILED

  shellcheck:
    name: ShellCheck & Workflow Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install actionlint
        run: |
          bash <(curl -sS https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv actionlint /usr/local/bin/

      - name: Lint workflow files with actionlint
        # actionlint runs shellcheck on every `run:` block inside workflow YAML,
        # catching the class of bash -e / &&-chain bugs that hit us in production.
        run: actionlint .github/workflows/build-deploy.yml .github/workflows/reindex.yml

      - name: ShellCheck scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './langchain_agent/scripts'
          severity: warning

      - name: Generate shellcheck summary
        if: always()
        run: |
          {
            echo "## ShellCheck & Workflow Lint"
            echo ""
            echo "Scanned: \`langchain_agent/scripts/*.sh\` and \`.github/workflows/*.yml\` (via actionlint)"
          } >> "$GITHUB_STEP_SUMMARY"

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, lint-backend, frontend-tests, shellcheck]
    # Only build & push on main (or manual dispatch) — PRs run lint + tests
    # only. A broken Dockerfile will be caught by the next push to main; the
    # `make ci` gate covers the Python failures that were the common case.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push Docker image (main)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./langchain_agent/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:buildcache,mode=max

  deploy-cloud-run:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="\
          POSTGRES_HOST=136.111.249.119,\
          POSTGRES_DB=langchain_agent,\
          POSTGRES_USER=postgres,\
          OPENSEARCH_HOST=34.138.97.13,\
          OPENSEARCH_PORT=9200,\
          OPENSEARCH_USE_SSL=true,\
          OPENSEARCH_VERIFY_CERTS=false,\
          LLM_MODEL=gemini-3-flash-preview,\
          RERANKER_MODEL=gemini-3.1-flash-lite-preview,\
          QUERY_EVAL_MODEL=gemini-3.1-flash-lite-preview,\
          EMBEDDINGS_MODEL=models/gemini-embedding-001,\
          LOG_LEVEL=INFO,\
          LOG_FORMAT=json" \
            --set-secrets="\
          API_KEY=agentic-hybrid-search-api-key:latest,\
          GOOGLE_API_KEY=agentic-hybrid-search-google-api-key:latest,\
          POSTGRES_PASSWORD=agentic-hybrid-search-db-password:latest,\
          OPENSEARCH_USER=agentic-hybrid-search-opensearch-user:latest,\
          OPENSEARCH_PASSWORD=agentic-hybrid-search-opensearch-password:latest" \
            --memory=2Gi \
            --timeout=3600 \
            --min-instances=0 \
            --max-instances=2 \
            --no-traffic \
            --quiet

      - name: Run smoke tests
        run: |
          # Wait for service to be ready
          sleep 10
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"

          # Test health endpoint
          curl -f "$SERVICE_URL/api/health" || exit 1
          echo "✓ Health check passed"

      - name: Generate deploy summary
        if: always()
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)' 2>/dev/null || echo "unavailable")
          REVISION=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.latestCreatedRevisionName)' 2>/dev/null || echo "unavailable")
          {
            echo "## Cloud Run Deployment"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Service URL | [$SERVICE_URL]($SERVICE_URL) |"
            echo "| Revision | \`$REVISION\` |"
            echo "| Image SHA | \`${{ github.sha }}\` |"
            echo "| Region | ${{ env.REGION }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Promote to production (100% traffic)
        if: success()
        run: |
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --to-revisions=LATEST=100

  smoke-tests:
    name: Post-Deployment Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-cloud-run
    if: success()
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd langchain_agent
          pip install pytest pytest-asyncio pytest-timeout httpx websockets

      - name: Get Cloud Run service URL
        id: service-url
        run: |
          SERVICE_URL="https://${SERVICE_NAME}-375500751528.${REGION}.run.app"
          echo "SERVICE_URL=$SERVICE_URL" >> "$GITHUB_OUTPUT"

      - name: Wait for service to be ready
        run: |
          SERVICE_URL="${{ steps.service-url.outputs.SERVICE_URL }}"
          max_retries=10
          retry_count=0

          echo "Waiting for Cloud Run service to be ready..."
          while [ $retry_count -lt $max_retries ]; do
            if curl -sf "$SERVICE_URL/api/health" > /dev/null 2>&1; then
              echo "✓ Service is ready"
              exit 0
            fi
            echo "⏳ Attempt $((retry_count + 1))/$max_retries - Service not ready yet"
            retry_count=$((retry_count + 1))
            sleep 3
          done

          echo "❌ Service failed to become ready after $max_retries attempts"
          exit 1

      - name: Run health check smoke test
        run: |
          SERVICE_URL="${{ steps.service-url.outputs.SERVICE_URL }}"
          echo "Testing health endpoint: $SERVICE_URL/api/health"

          response=$(curl -s "$SERVICE_URL/api/health")
          echo "Health response: $response"

          # Check if response contains expected fields
          echo "$response" | grep -q '"status"' || (echo "❌ Missing status field" && exit 1)
          echo "$response" | grep -q '"postgres"' || (echo "❌ Missing postgres field" && exit 1)
          echo "$response" | grep -q '"google_ai"' || (echo "❌ Missing google_ai field" && exit 1)
          echo "$response" | grep -q '"vector_store"' || (echo "❌ Missing vector_store field" && exit 1)

          echo "✓ Health check passed"

      - name: Run deployment smoke tests
        env:
          CLOUD_RUN_URL: ${{ steps.service-url.outputs.SERVICE_URL }}
          PYTHONPATH: langchain_agent
        run: |
          cd langchain_agent

          pytest tests/e2e/test_deployment_smoke.py \
            -v \
            --tb=short \
            -m "e2e and slow" \
            --timeout=30 \
            --asyncio-mode=auto \
            2>&1 | tee smoke-test-results.txt

          exit_code=${PIPESTATUS[0]}

          if [ "$exit_code" -eq 0 ]; then
            echo "✓ Smoke tests passed"
          else
            echo "❌ Smoke tests failed"
          fi

          exit "$exit_code"

      - name: Run Cloud Run deployment tests
        env:
          CLOUD_RUN_URL: ${{ steps.service-url.outputs.SERVICE_URL }}
          PYTHONPATH: langchain_agent
        run: |
          cd langchain_agent

          pytest tests/e2e/test_cloud_run_deployment.py \
            -v \
            --tb=short \
            -m "e2e and slow" \
            --timeout=30 \
            --asyncio-mode=auto \
            2>&1 | tee cloud-run-test-results.txt

          exit_code=${PIPESTATUS[0]}

          if [ "$exit_code" -eq 0 ]; then
            echo "✓ Cloud Run tests passed"
          else
            echo "❌ Cloud Run tests failed"
          fi

          exit "$exit_code"

      - name: Run deployment data tests
        env:
          CLOUD_RUN_URL: ${{ steps.service-url.outputs.SERVICE_URL }}
          PYTHONPATH: langchain_agent
        run: |
          cd langchain_agent

          pytest tests/e2e/test_deployment_data.py \
            -v \
            --tb=short \
            -m "e2e and slow" \
            --timeout=30 \
            --asyncio-mode=auto \
            2>&1 | tee data-test-results.txt

          exit_code=${PIPESTATUS[0]}

          if [ "$exit_code" -eq 0 ]; then
            echo "✓ Data tests passed"
          else
            echo "❌ Data tests failed"
          fi

          exit "$exit_code"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-results
          path: |
            langchain_agent/smoke-test-results.txt
            langchain_agent/cloud-run-test-results.txt
            langchain_agent/data-test-results.txt

      - name: Report deployment status
        if: always()
        run: |
          {
            echo "## Deployment Smoke Test Report"
            echo ""
            echo "**Service URL:** ${{ steps.service-url.outputs.SERVICE_URL }}"
            echo ""
            echo "### Test Summary"
            if [ -f "langchain_agent/smoke-test-results.txt" ]; then
              test_count=$(grep -c "PASSED\|FAILED" langchain_agent/smoke-test-results.txt || echo "0")
              echo "- **Smoke Tests:** $test_count tests"
            fi
            if [ -f "langchain_agent/cloud-run-test-results.txt" ]; then
              test_count=$(grep -c "PASSED\|FAILED" langchain_agent/cloud-run-test-results.txt || echo "0")
              echo "- **Cloud Run Tests:** $test_count tests"
            fi
            if [ -f "langchain_agent/data-test-results.txt" ]; then
              test_count=$(grep -c "PASSED\|FAILED" langchain_agent/data-test-results.txt || echo "0")
              echo "- **Data Tests:** $test_count tests"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Workflow Status Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, lint-backend, frontend-tests, shellcheck, build-docker, deploy-cloud-run, smoke-tests]
    if: always()

    steps:
      - name: Check workflow status
        run: |
          result_icon() {
            case "$1" in
              success) echo "✅ Passed" ;;
              failure) echo "❌ Failed" ;;
              skipped) echo "⏭️ Skipped" ;;
              cancelled) echo "🚫 Cancelled" ;;
              *) echo "❓ $1" ;;
            esac
          }

          UNIT_RESULT="${{ needs.unit-tests.result }}"
          INT_RESULT="${{ needs.integration-tests.result }}"
          LINT_RESULT="${{ needs.lint-backend.result }}"
          FRONTEND_RESULT="${{ needs.frontend-tests.result }}"
          SHELLCHECK_RESULT="${{ needs.shellcheck.result }}"
          DOCKER_RESULT="${{ needs.build-docker.result }}"
          DEPLOY_RESULT="${{ needs.deploy-cloud-run.result }}"
          SMOKE_RESULT="${{ needs.smoke-tests.result }}"

          {
            echo "## Workflow Summary — ${{ github.ref_name }} @ \`${{ github.sha }}\`"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Phase 1 — Unit Tests | $(result_icon $UNIT_RESULT) |"
            echo "| Phase 2 — Integration Tests | $(result_icon $INT_RESULT) |"
            echo "| Linting & Type Checks | $(result_icon $LINT_RESULT) |"
            echo "| Frontend Tests & Lint | $(result_icon $FRONTEND_RESULT) |"
            echo "| ShellCheck & Workflow Lint | $(result_icon $SHELLCHECK_RESULT) |"
            echo "| Build Docker Image | $(result_icon $DOCKER_RESULT) |"
            echo "| Deploy to Cloud Run | $(result_icon $DEPLOY_RESULT) |"
            echo "| Post-Deployment Smoke Tests | $(result_icon $SMOKE_RESULT) |"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=0
          for r in $UNIT_RESULT $INT_RESULT $LINT_RESULT $FRONTEND_RESULT $SHELLCHECK_RESULT $DOCKER_RESULT $DEPLOY_RESULT $SMOKE_RESULT; do
            [ "$r" = "failure" ] && FAILED=1
          done

          [ $FAILED -eq 1 ] && exit 1
          echo "✅ All checks passed"
