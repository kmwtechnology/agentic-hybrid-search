name: Build & Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'langchain_agent/**'
      - '.github/workflows/build-deploy.yml'
      - 'docker-compose.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'langchain_agent/**'
      - '.github/workflows/build-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PROJECT_ID: gen-lang-client-0250737934
  REGION: us-central1
  SERVICE_NAME: agentic-hybrid-search
  ARTIFACT_REGISTRY_REPO: agentic-hybrid-search

jobs:
  unit-tests:
    name: Phase 1 - Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd langchain_agent
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout pytest-xdist

      - name: Create test .env
        run: |
          cd langchain_agent
          cat > .env.test << EOF
          GOOGLE_API_KEY=test-key-12345
          POSTGRES_USER=test
          POSTGRES_PASSWORD=test
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          POSTGRES_DB=agentic_hybrid_search_test
          OPENSEARCH_HOST=localhost
          OPENSEARCH_PORT=9200
          OPENSEARCH_USE_SSL=false
          API_KEY=test-api-key-12345
          LLM_MODEL=gemini-3-flash-preview
          RERANKER_MODEL=gemini-3.1-flash-lite-preview
          QUERY_EVAL_MODEL=gemini-3.1-flash-lite-preview
          EMBEDDINGS_MODEL=models/gemini-embedding-001
          EOF

      - name: Run Phase 1 Unit Tests
        run: |
          cd langchain_agent
          PYTHONPATH=. pytest tests/unit/ \
            -v \
            --tb=short \
            --timeout=30 \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing:skip-covered \
            --junit-xml=test-results-phase1.xml
        env:
          ENV_FILE: .env.test

      - name: Upload Phase 1 Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-phase1
          path: langchain_agent/htmlcov/
          retention-days: 30

      - name: Upload Phase 1 Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-phase1
          path: langchain_agent/test-results-phase1.xml
          retention-days: 30

  integration-tests:
    name: Phase 2 - Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agentic_hybrid_search_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      opensearch:
        image: opensearchproject/opensearch:2.11.0
        env:
          discovery.type: single-node
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: TestPassword123!
          OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
          DISABLE_SECURITY_PLUGIN: "true"
        options: >-
          --health-cmd "curl -s http://localhost:9200 > /dev/null || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
        ports:
          - 9200:9200

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd langchain_agent
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout pytest-xdist

      - name: Create test .env
        run: |
          cd langchain_agent
          cat > .env.test << EOF
          GOOGLE_API_KEY=test-key-12345
          POSTGRES_USER=test
          POSTGRES_PASSWORD=test
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          POSTGRES_DB=agentic_hybrid_search_test
          OPENSEARCH_HOST=localhost
          OPENSEARCH_PORT=9200
          OPENSEARCH_USE_SSL=false
          API_KEY=test-api-key-12345
          LLM_MODEL=gemini-3-flash-preview
          RERANKER_MODEL=gemini-3.1-flash-lite-preview
          QUERY_EVAL_MODEL=gemini-3.1-flash-lite-preview
          EMBEDDINGS_MODEL=models/gemini-embedding-001
          EOF

      - name: Verify Services
        run: |
          echo "Checking PostgreSQL..."
          pg_isready -h localhost -p 5432 -U test
          echo "PostgreSQL ready!"

          echo "Checking OpenSearch..."
          curl -s http://localhost:9200 | head -c 50
          echo ""
          echo "OpenSearch ready!"

      - name: Run Phase 2 Integration Tests
        run: |
          cd langchain_agent
          PYTHONPATH=. pytest tests/integration/ \
            -v \
            --tb=short \
            --timeout=60 \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing:skip-covered \
            --junit-xml=test-results-phase2.xml
        env:
          ENV_FILE: .env.test

      - name: Upload Phase 2 Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-phase2
          path: langchain_agent/test-results-phase2.xml
          retention-days: 30

  lint-backend:
    name: Linting & Type Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install flake8 black isort mypy types-requests

      - name: Check code formatting with black
        run: |
          cd langchain_agent
          if black --check . --exclude venv/ --exclude .venv; then
            echo "✓ Black formatting check passed"
          else
            echo "::warning title=Black::Formatting issues found (non-blocking). Run 'black .' locally to fix."
          fi

      - name: Sort imports with isort
        run: |
          cd langchain_agent
          if isort --check-only . --skip venv/ --skip .venv; then
            echo "✓ isort import sorting check passed"
          else
            echo "::warning title=isort::Import ordering issues found (non-blocking). Run 'isort .' locally to fix."
          fi

      - name: Lint with flake8
        run: |
          cd langchain_agent
          if flake8 . --exclude venv/,.venv --max-line-length=100 --count; then
            echo "✓ flake8 linting check passed"
          else
            echo "::warning title=flake8::Lint issues found (non-blocking)."
          fi

      - name: Type check with mypy
        run: |
          cd langchain_agent
          if mypy main.py --ignore-missing-imports; then
            echo "✓ mypy type checking passed"
          else
            echo "::warning title=mypy::Type errors found (non-blocking)."
          fi

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, lint-backend]
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build Docker image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./langchain_agent/Dockerfile
          push: false
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:latest

      - name: Build and push Docker image (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./langchain_agent/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:buildcache,mode=max

  deploy-cloud-run:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="\
          POSTGRES_HOST=136.111.249.119,\
          POSTGRES_DB=langchain_agent,\
          POSTGRES_USER=postgres,\
          OPENSEARCH_HOST=34.138.97.13,\
          OPENSEARCH_PORT=9200,\
          OPENSEARCH_USE_SSL=true,\
          OPENSEARCH_VERIFY_CERTS=false,\
          LLM_MODEL=gemini-3-flash-preview,\
          RERANKER_MODEL=gemini-3.1-flash-lite-preview,\
          QUERY_EVAL_MODEL=gemini-3.1-flash-lite-preview,\
          EMBEDDINGS_MODEL=models/gemini-embedding-001,\
          LOG_LEVEL=INFO,\
          LOG_FORMAT=json" \
            --set-secrets="\
          API_KEY=agentic-hybrid-search-api-key:latest,\
          GOOGLE_API_KEY=agentic-hybrid-search-google-api-key:latest,\
          POSTGRES_PASSWORD=agentic-hybrid-search-db-password:latest,\
          OPENSEARCH_USER=agentic-hybrid-search-opensearch-user:latest,\
          OPENSEARCH_PASSWORD=agentic-hybrid-search-opensearch-password:latest" \
            --memory=2Gi \
            --timeout=3600 \
            --min-instances=0 \
            --max-instances=2 \
            --no-traffic \
            --quiet

      - name: Run smoke tests
        run: |
          # Wait for service to be ready
          sleep 10
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"

          # Test health endpoint
          curl -f "$SERVICE_URL/api/health" || exit 1
          echo "✓ Health check passed"

      - name: Promote to production (100% traffic)
        if: success()
        run: |
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --to-revisions=LATEST=100

  smoke-tests:
    name: Post-Deployment Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-cloud-run
    if: success()
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd langchain_agent
          pip install pytest pytest-asyncio pytest-timeout httpx websockets

      - name: Get Cloud Run service URL
        id: service-url
        run: |
          SERVICE_URL="https://${SERVICE_NAME}-375500751528.${REGION}.run.app"
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_OUTPUT

      - name: Wait for service to be ready
        run: |
          SERVICE_URL="${{ steps.service-url.outputs.SERVICE_URL }}"
          max_retries=10
          retry_count=0

          echo "Waiting for Cloud Run service to be ready..."
          while [ $retry_count -lt $max_retries ]; do
            if curl -sf "$SERVICE_URL/api/health" > /dev/null 2>&1; then
              echo "✓ Service is ready"
              exit 0
            fi
            echo "⏳ Attempt $((retry_count + 1))/$max_retries - Service not ready yet"
            retry_count=$((retry_count + 1))
            sleep 3
          done

          echo "❌ Service failed to become ready after $max_retries attempts"
          exit 1

      - name: Run health check smoke test
        run: |
          SERVICE_URL="${{ steps.service-url.outputs.SERVICE_URL }}"
          echo "Testing health endpoint: $SERVICE_URL/api/health"

          response=$(curl -s "$SERVICE_URL/api/health")
          echo "Health response: $response"

          # Check if response contains expected fields
          echo "$response" | grep -q '"status"' || (echo "❌ Missing status field" && exit 1)
          echo "$response" | grep -q '"postgres"' || (echo "❌ Missing postgres field" && exit 1)
          echo "$response" | grep -q '"google_ai"' || (echo "❌ Missing google_ai field" && exit 1)
          echo "$response" | grep -q '"vector_store"' || (echo "❌ Missing vector_store field" && exit 1)

          echo "✓ Health check passed"

      - name: Run deployment smoke tests
        env:
          CLOUD_RUN_URL: ${{ steps.service-url.outputs.SERVICE_URL }}
          PYTHONPATH: langchain_agent
        run: |
          cd langchain_agent

          pytest tests/e2e/test_deployment_smoke.py \
            -v \
            --tb=short \
            -m "e2e and slow" \
            --timeout=30 \
            --asyncio-mode=auto \
            2>&1 | tee smoke-test-results.txt

          exit_code=${PIPESTATUS[0]}

          if [ $exit_code -eq 0 ]; then
            echo "✓ Smoke tests passed"
          else
            echo "❌ Smoke tests failed"
          fi

          exit $exit_code

      - name: Run Cloud Run deployment tests
        env:
          CLOUD_RUN_URL: ${{ steps.service-url.outputs.SERVICE_URL }}
          PYTHONPATH: langchain_agent
        run: |
          cd langchain_agent

          pytest tests/e2e/test_cloud_run_deployment.py \
            -v \
            --tb=short \
            -m "e2e and slow" \
            --timeout=30 \
            --asyncio-mode=auto \
            2>&1 | tee cloud-run-test-results.txt

          exit_code=${PIPESTATUS[0]}

          if [ $exit_code -eq 0 ]; then
            echo "✓ Cloud Run tests passed"
          else
            echo "❌ Cloud Run tests failed"
          fi

          exit $exit_code

      - name: Run deployment data tests
        env:
          CLOUD_RUN_URL: ${{ steps.service-url.outputs.SERVICE_URL }}
          PYTHONPATH: langchain_agent
        run: |
          cd langchain_agent

          pytest tests/e2e/test_deployment_data.py \
            -v \
            --tb=short \
            -m "e2e and slow" \
            --timeout=30 \
            --asyncio-mode=auto \
            2>&1 | tee data-test-results.txt

          exit_code=${PIPESTATUS[0]}

          if [ $exit_code -eq 0 ]; then
            echo "✓ Data tests passed"
          else
            echo "❌ Data tests failed"
          fi

          exit $exit_code

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-results
          path: |
            langchain_agent/smoke-test-results.txt
            langchain_agent/cloud-run-test-results.txt
            langchain_agent/data-test-results.txt

      - name: Report deployment status
        if: always()
        run: |
          echo "## Deployment Smoke Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service URL:** ${{ steps.service-url.outputs.SERVICE_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Summary" >> $GITHUB_STEP_SUMMARY

          if [ -f "langchain_agent/smoke-test-results.txt" ]; then
            test_count=$(grep -c "PASSED\|FAILED" langchain_agent/smoke-test-results.txt || echo "0")
            echo "- **Smoke Tests:** $test_count tests" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "langchain_agent/cloud-run-test-results.txt" ]; then
            test_count=$(grep -c "PASSED\|FAILED" langchain_agent/cloud-run-test-results.txt || echo "0")
            echo "- **Cloud Run Tests:** $test_count tests" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "langchain_agent/data-test-results.txt" ]; then
            test_count=$(grep -c "PASSED\|FAILED" langchain_agent/data-test-results.txt || echo "0")
            echo "- **Data Tests:** $test_count tests" >> $GITHUB_STEP_SUMMARY
          fi

  notify:
    name: Workflow Status Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, lint-backend, build-docker, deploy-cloud-run, smoke-tests]
    if: always()

    steps:
      - name: Check workflow status
        run: |
          FAILED=0

          if [ "${{ needs.unit-tests.result }}" = "failure" ]; then
            echo "❌ Unit tests failed"
            FAILED=1
          fi

          if [ "${{ needs.integration-tests.result }}" = "failure" ]; then
            echo "❌ Integration tests failed"
            FAILED=1
          fi

          if [ "${{ needs.lint-backend.result }}" = "failure" ]; then
            echo "❌ Linting checks failed"
            FAILED=1
          fi

          if [ "${{ needs.build-docker.result }}" = "failure" ]; then
            echo "❌ Docker build failed"
            FAILED=1
          fi

          if [ "${{ needs.deploy-cloud-run.result }}" = "failure" ]; then
            echo "❌ Cloud Run deployment failed"
            FAILED=1
          fi

          if [ "${{ needs.smoke-tests.result }}" = "failure" ]; then
            echo "❌ Deployment smoke tests failed"
            FAILED=1
          fi

          if [ "${{ needs.deploy-cloud-run.result }}" = "skipped" ]; then
            echo "⏭️ Deployment skipped (not main branch)"
          fi

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

          echo "✅ All checks passed: tests, build, deployment, and smoke tests"
